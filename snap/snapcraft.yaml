name: charmed-opensearch-dashboards
base: core24

version: '2.19.2'

summary: 'OpenSearch Dashboards: community-driven OpenSearch visualization suite.'
description: |
    OpenSearch Dashboard is a community-driven, Apache 2.0-licensed open source
    user interface that lets you visualize your OpenSearch data and run and scale
    your OpenSearch clusters.

grade: stable

confinement: strict

platforms:
  amd64:


package-repositories:
  - type: apt
    components: [main]
    suites: [noble]
    key-id: 250888D21C2C3843BB4D5E35EB948C132E00C6DB
    url: https://ppa.launchpadcontent.net/gabrielcocenza/prometheus-opensearch-dashboards-exporter/ubuntu


system-usernames:
  snap_daemon: shared


slots:
  logs:
    interface: content
    source:
      read:
        - $SNAP_COMMON/var/log/opensearch-dashboards

hooks:
  install:
    plugs:
      - network
      - network-bind
    environment:
      OPS_ROOT: ${SNAP_CURRENT}/opt/opensearch-dashboards


environment:
  SNAP_CURRENT: /snap/charmed-opensearch-dashboards/current
  SNAP_DATA_CURRENT: /var/snap/charmed-opensearch-dashboards/current

  SNAP_LOG_DIR: ${SNAP_COMMON}/ops/snap/logs

  OPS_ROOT: ${SNAP_CURRENT}/opt/opensearch-dashboards


  # Read-only spaces -- executables

  OPENSEARCH_DASHBOARDS_RO_HOME: ${SNAP_CURRENT}/usr/share/opensearch-dashboards
  OPENSEARCH_DASHBOARDS_BIN: ${OPENSEARCH_DASHBOARDS_RO_HOME}/bin
  OPENSEARCH_DASHBOARDS_DEPS_BIN: ${SNAP_CURRENT}/usr/bin
  NODE_HOME: ${OPENSEARCH_DASHBOARDS_RO_HOME}/node

  # Read-write spaces

  OPENSEARCH_DASHBOARDS_RW_HOME: ${SNAP_DATA_CURRENT}/usr/share/opensearch-dashboards
  OPENSEARCH_DASHBOARDS_PATH_CONF: ${SNAP_DATA_CURRENT}/etc/opensearch-dashboards

  OPENSEARCH_DASHBOARDS_VARLOG: ${SNAP_COMMON}/var/log/opensearch-dashboards
  OPENSEARCH_DASHBOARDS_VARLIB: ${SNAP_COMMON}/var/lib/opensearch-dashboards
  OPENSEARCH_DASHBOARDS_TMPDIR: ${SNAP_COMMON}/usr/share/tmp

  # include the dist-packages to be able to run the exporter
  PYTHONPATH: "$SNAP/usr/lib/python3/dist-packages:$PYTHONPATH"


apps:
  opensearch-dashboards-daemon:
    daemon: simple
    install-mode: disable
    command: opt/opensearch-dashboards/start.sh
    restart-condition: always
    restart-delay: 20s
    plugs:
      - network
      - network-bind

  exporter-daemon:
    daemon: simple
    after:
      - opensearch-dashboards-daemon
    install-mode: disable
    command: opt/opensearch-dashboards/start-exporter.sh
    restart-condition: always
    restart-delay: 5s
    plugs:
      - network
      - network-bind


parts:
  dependencies:
    plugin: nil
    stage-snaps:
      - yq
    stage-packages:
      - util-linux
      - prometheus-opensearch-dashboards-exporter

  wrapper-scripts:
    plugin: nil
    source: ./scripts
    source-type: local
    override-build: |
      target_dir="${CRAFT_PART_INSTALL}/opt/opensearch-dashboards"
      mkdir -p "${target_dir}"
      cp -r wrappers/. "${target_dir}"

  helper-scripts:
    plugin: nil
    source: .
    source-type: local
    override-build: |
      target_dir="${CRAFT_PART_INSTALL}/opt/opensearch-dashboards"
      mkdir -p "${target_dir}"
      cp -r helpers/ "${target_dir}/helpers"

  nodejs:
    plugin: nil
    override-build: |
      snap install node --channel=18/stable --classic

  # Plugins 
  alerting-dashboards-plugin:
    plugin: nil
    source: https://git.launchpad.net/alerting-dashboards-plugin
    source-type: git
    source-tag: lp-v2.19.2.0
    source-depth: 1
    override-build: |
      mkdir -p "${CRAFT_STAGE}/plugins/${CRAFT_PART_NAME}"
      cp -r "${CRAFT_PART_SRC}/." "${CRAFT_STAGE}/plugins/${CRAFT_PART_NAME}"

  anomaly-detection-dashboards-plugin:
    plugin: nil
    source: https://git.launchpad.net/anomaly-detection-dashboards-plugin
    source-type: git
    source-tag: lp-v2.19.2.0
    source-depth: 1
    override-stage: |
