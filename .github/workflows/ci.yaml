name: Build and Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
  pull_request:

jobs:
  build:
    name: Build Snap
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      snap-file: ${{ steps.build-snap.outputs.snap }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Upgrade linux deps
        run: |
          sudo apt-get update

          # install security updates
          sudo apt-get -s dist-upgrade \
            | grep "^Inst" \
            | grep -i securi \
            | awk -F " " {'print $2'} \
            | xargs sudo apt-get install -y

          sudo apt-get autoremove -y
          sudo apt-get clean -y

      - id: build-snap
        name: Build snap
        uses: snapcore/action-build@v1

      - name: Upload built snap job artifact
        uses: actions/upload-artifact@v4
        with:
          name: charmed-opensearch-dashboards_snap_amd64
          path: "charmed-opensearch-dashboards_*.snap"

  scan:
    name: Trivy scan and SBOM Generation
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download snap file for Charmed OpenSearch Dashboards
        uses: actions/download-artifact@v4
        with:
          name: charmed-opensearch-dashboards_snap_amd64
          path: .

      - name: Install snap file for Charmed Opensearch Dashboards
        run: |
          version="$(yq .version < snap/snapcraft.yaml)"

          sudo snap install charmed-opensearch-dashboards_${version}_amd64.snap --dangerous --jailmode

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: "fs"
          scan-ref: /snap/charmed-opensearch-dashboards/current/usr/share/opensearch-dashboards/
          format: "sarif"
          output: "trivy-results.sarif"
          scanners: "vuln"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy in GitHub SBOM mode and submit results to Dependency Graph
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: "fs"
          scan-ref: /snap/charmed-opensearch-dashboards/current/usr/share/opensearch-dashboards/
          format: "spdx-json"
          output: "dependency-results.sbom.json"
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          severity: "MEDIUM,HIGH,CRITICAL"
          scanners: "vuln"

      - name: Upload trivy report as a Github artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results.sarif
          path: "${{ github.workspace }}/trivy-results.sarif"
          retention-days: 90

      - name: Upload trivy report as a Github artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sbom-report
          path: "${{ github.workspace }}/dependency-results.sbom.json"
          retention-days: 90

  test:
    name: Test Snap
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup the required system configs OpenSearch
        run: |
          sudo snap install opensearch --channel=2/edge --revision=76
          sudo snap connect opensearch:process-control

          sudo sysctl -w vm.swappiness=0
          sudo sysctl -w vm.max_map_count=262144
          sudo sysctl -w net.ipv4.tcp_retries2=5

      - name: Setup and Start OpenSearch
        run: |
          # create the certificates
          sudo snap run opensearch.setup \
              --node-name cm0 \
              --node-roles cluster_manager,data \
              --tls-priv-key-root-pass root1234 \
              --tls-priv-key-admin-pass admin1234 \
              --tls-priv-key-node-pass node1234 \
              --tls-init-setup yes                 # this creates the root and admin certs as well.

          # start opensearch
          sudo snap start opensearch.daemon

          # wait a bit for it to fully initialize
          sleep 60s

          # create the security index
          sudo snap run opensearch.security-init --tls-priv-key-admin-pass=admin1234

      - name: Download snap file for Charmed OpenSearch Dashboards
        uses: actions/download-artifact@v4
        with:
          name: charmed-opensearch-dashboards_snap_amd64
          path: .

      - name: Install snap file for Charmed Opensearch Dashboards
        run: |
          version="$(yq .version < snap/snapcraft.yaml)"

          sudo snap install charmed-opensearch-dashboards_${version}_amd64.snap --dangerous --jailmode

      - name: Test Charmed Opensearch Dashboards
        run: |
          sudo snap start charmed-opensearch-dashboards

          # Wait until the service establishes
          service_unavailable=$(curl -i http://localhost:5601 \
            --connect-timeout 5 \
            --retry 5 \
            --retry-delay 5 \
            --retry-max-time 60 \
            --retry-connrefused  | grep "302 Found")
          if [ ! "$service_unavailable" ]; then
            echo "ERROR: Service unavailable. Aborting..." >&2
            exit 1
          fi

          # Attempt to access the interface using valid authentication
          authenticate_ok=$(curl -i  -k -XPOST http://localhost:5601/auth/login \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'osd-xsrf:true' \
            -d '{"username":"kibanaserver","password":"kibanaserver"}' | grep "200 OK")

          if [ ! "$authenticate_ok" ]; then
            echo "ERROR: Authentication failed with correct credentials. Aborting..." >&2
            exit 1
          fi

          # Attempt to access the interface wrongly authenticated
          wrong_credentials_fail=$(curl -i  -k -XPOST http://localhost:5601/auth/login \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'osd-xsrf:true' \
            -d '{"username":"admin","password":"test"}' | grep "401 Unauthorized")

          if [ ! "$wrong_credentials_fail" ]; then
            echo "ERROR: Authentication allowed with wrong credentials. Aborting..." >&2
            exit 1
          fi

          # Check if logs are collected as expected
          logfile="/var/snap/charmed-opensearch-dashboards/common/var/log/opensearch-dashboards/opensearch_dashboards.log"
          if ! sudo test -s "${logfile}"; then
            echo "ERROR: Logfile unaccessible. Aborting..." >&2
            exit 1
          fi

      - name: Test Prometheus Exporter
        run: |
          URL=http://localhost:9684/metrics

          # Wait until the service esteblishes
          metrics=$(curl ${URL} \
            --connect-timeout 5 \
            --retry 5 \
            --retry-delay 5 \
            --retry-max-time 60 \
            --retry-connrefused)

          if [[ "$metrics" ==  *"opensearch_dashboards_up 0.0"* ]]; then
            echo "ERROR: Prometheus exporter unavailable (connected to OSD on HTTP). Aborting..." >&2
            exit 1
          fi

          echo "Successfully connected to the Exporter service"

          sudo snap set charmed-opensearch-dashboards scheme=https
          sudo snap restart charmed-opensearch-dashboards
          sleep 10

          # Wait until the service establishes
          metrics=$(curl ${URL} \
            --connect-timeout 5 \
            --retry 5 \
            --retry-delay 5 \
            --retry-max-time 60 \
            --retry-connrefused)

           if [[ "$metrics" ==  *"opensearch_dashboards_up 1.0"* ]]; then
            echo "ERROR: Prometheus exporter available when it should be connecting to a non-existent service. Aborting..." >&2
            exit 1
          fi

          echo "Exporter was down when it was supposed to be"

          # Wrong setting defaults to HTTP, so the exporter should work
          sudo snap set charmed-opensearch-dashboards scheme=httpblabla
          sudo snap restart charmed-opensearch-dashboards
          sleep 10

          # Wait until the service establishes
          metrics=$(curl ${URL} \
            --connect-timeout 5 \
            --retry 5 \
            --retry-delay 5 \
            --retry-max-time 60 \
            --retry-connrefused)
          if [[ "$metrics" ==  *"opensearch_dashboards_up 0.0"* ]]; then
            echo "ERROR: Prometheus exporter unavailable (connected to OSD on HTTP). Aborting..." >&2
            exit 1
          fi

          echo "Snap defaults correctly applied as Exporter settings"

      - name: Test Logs slot
        run: |
          logs_slot_avail=$(sudo snap connections charmed-opensearch-dashboards | grep opensearch-dashboards:logs)

          if [ ! "$logs_slot_avail" ]; then
            echo "ERROR: Logs slot is not available. Aborting..." >&2
            exit 1
          fi
